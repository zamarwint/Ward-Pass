<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="src/assets/ward-pass-icon.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="src/css/app.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="src/js/app.js" async defer></script>
    <title>Ward-Pass App</title>
  </head>
  <body>
    <div class="main-section" data-aos="flip-up" data-aos-duration="1000">
      <div class="header-items" data-aos="flip-up" data-aos-duration="1500">
        <a href="index.html" class="button btn1">Back</a>
        <i id="toggle" class="fa-solid fa-sun"></i>
      </div>
      <div
        class="main-div slider-box"
        data-aos="flip-up"
        data-aos-duration="2000"
      >
        <label for="slider">Choose your desired password length</label>
        <input
          type="range"
          name="slider"
          id="slider"
          min="0"
          max="20"
          step="1"
        />
        <h3 class="range-value">0</h3>
      </div>

      <div
        class="main-div checkbox-divs"
        data-aos="flip-up"
        data-aos-duration="2500"
      >
        <div class="checkbox-div checkbox-div1">
          <input type="checkbox" name="uppercase" id="uppercase" />
          <label for="uppercase">Include UPPERCASE letters</label>
        </div>

        <div class="checkbox-div checkbox-div2">
          <input type="checkbox" name="lowercase" id="lowercase" />
          <label for="lowercase">Include lowercase letters</label>
        </div>

        <div class="checkbox-div checkbox-div3">
          <input type="checkbox" name="numbers" id="numbers" />
          <label for="numbers">Include numbers</label>
        </div>

        <div class="checkbox-div checkbox-div4">
          <input type="checkbox" name="symbols" id="symbols" />
          <label for="symbols">Include symbols</label>
        </div>

        <div class="checkbox-div checkbox-div5">
          <input type="checkbox" name="spaces" id="spaces" />
          <label for="spaces">Include spaces</label>
        </div>
      </div>

      <div
        class="main-div password-box"
        data-aos="flip-up"
        data-aos-duration="3000"
      >
        <label for="password">Generated Password</label>
        <input type="text" name="password" id="password" disabled />
        <div class="password-buttons">
          <button class="generate-button" onclick="passwordGenerate()">
            Generate
          </button>
          <button class="copy-button" onclick="copyPassword()">Copy</button>
        </div>
      </div>

      <!-- <button class="try-dialog1">Try Dialog</button>
      <button class="try-dialog2">Try Dialog</button> -->

      <dialog data-success>
        <div class="main-div dialog-content">
          <!-- X ICON -->
          <svg
            fill="#ffffff"
            height="30px"
            width="30px"
            version="1.1"
            id="Capa_1"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 460.775 460.775"
            xml:space="preserve"
            stroke="#ffffff"
            class="close-success-modal"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                d="M285.08,230.397L456.218,59.27c6.076-6.077,6.076-15.911,0-21.986L423.511,4.565c-2.913-2.911-6.866-4.55-10.992-4.55 c-4.127,0-8.08,1.639-10.993,4.55l-171.138,171.14L59.25,4.565c-2.913-2.911-6.866-4.55-10.993-4.55 c-4.126,0-8.08,1.639-10.992,4.55L4.558,37.284c-6.077,6.075-6.077,15.909,0,21.986l171.138,171.128L4.575,401.505 c-6.074,6.077-6.074,15.911,0,21.986l32.709,32.719c2.911,2.911,6.865,4.55,10.992,4.55c4.127,0,8.08-1.639,10.994-4.55 l171.117-171.12l171.118,171.12c2.913,2.911,6.866,4.55,10.993,4.55c4.128,0,8.081-1.639,10.992-4.55l32.709-32.719 c6.074-6.075,6.074-15.909,0-21.986L285.08,230.397z"
              ></path>
            </g>
          </svg>
          <!-- SUCCESS IMAGE -->
          <svg
            viewBox="0 0 1024 1024"
            width="150px"
            height="150px"
            xmlns="http://www.w3.org/2000/svg"
            fill="#000000"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0" />
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <g id="SVGRepo_iconCarrier">
              <path
                fill="#1eff00"
                d="M512 64a448 448 0 1 1 0 896 448 448 0 0 1 0-896zm-55.808 536.384-99.52-99.584a38.4 38.4 0 1 0-54.336 54.336l126.72 126.72a38.272 38.272 0 0 0 54.336 0l262.4-262.464a38.4 38.4 0 1 0-54.272-54.336L456.192 600.384z"
              />
            </g>
          </svg>
          <h3>Password copied successfully!</h3>
        </div>
      </dialog>
      <dialog data-error>
        <div class="main-div dialog-content">
          <!-- X ICON -->
          <svg
            fill="#ffffff"
            height="30px"
            width="30px"
            version="1.1"
            id="Capa_1"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 0 460.775 460.775"
            xml:space="preserve"
            stroke="#ffffff"
            class="close-error-modal"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                d="M285.08,230.397L456.218,59.27c6.076-6.077,6.076-15.911,0-21.986L423.511,4.565c-2.913-2.911-6.866-4.55-10.992-4.55 c-4.127,0-8.08,1.639-10.993,4.55l-171.138,171.14L59.25,4.565c-2.913-2.911-6.866-4.55-10.993-4.55 c-4.126,0-8.08,1.639-10.992,4.55L4.558,37.284c-6.077,6.075-6.077,15.909,0,21.986l171.138,171.128L4.575,401.505 c-6.074,6.077-6.074,15.911,0,21.986l32.709,32.719c2.911,2.911,6.865,4.55,10.992,4.55c4.127,0,8.08-1.639,10.994-4.55 l171.117-171.12l171.118,171.12c2.913,2.911,6.866,4.55,10.993,4.55c4.128,0,8.081-1.639,10.992-4.55l32.709-32.719 c6.074-6.075,6.074-15.909,0-21.986L285.08,230.397z"
              ></path>
            </g>
          </svg>
          <!-- ERROR IMAGE -->
          <svg
            viewBox="0 0 24 24"
            width="150px"
            height="150px"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0" />
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <g id="SVGRepo_iconCarrier">
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zm-1.5-5.009c0-.867.659-1.491 1.491-1.491.85 0 1.509.624 1.509 1.491 0 .867-.659 1.509-1.509 1.509-.832 0-1.491-.642-1.491-1.509zM11.172 6a.5.5 0 0 0-.499.522l.306 7a.5.5 0 0 0 .5.478h1.043a.5.5 0 0 0 .5-.478l.305-7a.5.5 0 0 0-.5-.522h-1.655z"
                fill="#ff0000"
              />
            </g>
          </svg>
          <h3>An error occured! Please try again.</h3>
        </div>
      </dialog>
    </div>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
